<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bao Nhác Xinh Đẹp Tuyệt Vời 💖💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: linear-gradient(135deg, #ffe6f2, #fff0f8, #fce6ff);
    font-family: 'Poppins', system-ui, sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
  }

  /* ===== TIM RƠI ===== */
  #heartContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .heart {
    position: absolute;
    color: #ff4fa3;
    opacity: 0.8;
    animation: fall linear infinite;
    filter: drop-shadow(0 0 2px #ff4fa3);
  }

  @keyframes fall {
    0% {
      transform: translateY(-2rem) rotate(0deg);
      opacity: 0.8;
    }
    100% {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0;
    }
  }

  /* ===== CARD THIỆP ===== */
  .card {
    position: relative;
    background: #fff;
    border-radius: 25px;
    box-shadow: 0 0 20px 5px rgba(255, 79, 163, 0.4);
    border: 2px solid rgba(255, 79, 163, 0.6);
    width: 90vw;
    max-width: 400px;
    padding: 2.5rem 2rem 3rem;
    box-sizing: border-box;
    z-index: 10;
    text-align: center;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    color: #ff4fa3;
    font-size: 2.5rem;
    margin: 0 0 1.5rem 0;
  }

  /* ===== LOVE TEXT BOX ===== */
  #loveTextBox {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 15px;
    padding: 1rem 1.25rem;
    font-size: 1.1rem;
    color: #d6336c;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 0 10px 2px rgba(255, 105, 180, 0.3);
    transition: opacity 0.5s ease;
  }

  /* ===== BUTTONS ===== */
  .buttons {
    margin-top: 2rem;
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  button {
    background: linear-gradient(135deg, #ff6ec7, #ff9ad5);
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 1.1rem;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(255, 105, 180, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
  }

  button:hover, button:focus {
    outline: none;
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(255, 105, 180, 0.6);
  }

  /* ===== POPUP ===== */
  #popupOverlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9998;
  }

  #popupContent {
    background: white;
    border-radius: 20px;
    padding: 1.5rem 2rem;
    width: 90vw;
    max-width: 320px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    animation: popScale 0.3s ease forwards;
  }

  @keyframes popScale {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  #popupContent h2 {
    margin: 0;
    color: #ff4fa3;
    font-family: 'Pacifico', cursive;
    text-align: center;
  }

  .optionBtn {
    background: linear-gradient(135deg, #ff6ec7, #ff9ad5);
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 1rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    box-shadow: 0 3px 6px rgba(255, 105, 180, 0.5);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    justify-content: center;
    user-select: none;
    transition: transform 0.2s ease;
  }

  .optionBtn:hover, .optionBtn:focus {
    outline: none;
    transform: scale(1.05);
  }

  /* ===== MUSIC TOGGLE ===== */
  #musicToggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 10000;
    width: 36px;
    height: 36px;
    padding: 0;
    box-shadow: none;
  }

  #musicToggle svg {
    fill: #ff4fa3;
    width: 100%;
    height: 100%;
    transition: fill 0.3s ease;
  }

  #musicToggle:hover svg {
    fill: #ff9ad5;
  }

  /* ===== FIREWORK CANVAS ===== */
  #fireworkCanvas {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .card {
      width: 95vw;
      padding: 2rem 1.5rem 2.5rem;
    }
    h1 {
      font-size: 2rem;
    }
    button {
      font-size: 1rem;
      padding: 0.5rem 1.2rem;
    }
    #loveTextBox {
      font-size: 1rem;
      min-height: 60px;
    }
  }
</style>
</head>

<body>

  <!-- TIM RƠI -->
  <div id="heartContainer" aria-hidden="true"></div>

  <!-- CARD THIỆP -->
  <div class="card" role="main">
    <h1>Bao Nhác Xinh Đẹp Tuyệt Vời 💖✨</h1>
    <div id="loveTextBox" aria-live="polite" aria-atomic="true"></div>
    <div class="buttons">
      <button id="loveBtn" type="button">💌 Lời yêu thương</button>
      <button id="requestBtn" type="button">👑 Gửi yêu cầu</button>
    </div>
  </div>

  <!-- POPUP YÊU CẦU -->
  <div id="popupOverlay" role="dialog" aria-modal="true" tabindex="-1">
    <div id="popupContent">
      <h2>Chọn yêu cầu dấu thương 💕</h2>
      <button class="optionBtn" type="button">🍳 Nấu ăn cho em</button>
      <button class="optionBtn" type="button">🍓 Mua hoa quả</button>
      <button class="optionBtn" type="button">🎬 Xem phim</button>
      <button class="optionBtn" type="button">🛍 Đi shopping</button>
      <button class="optionBtn" type="button">🌸 Mua hoa tặng em</button>
    </div>
  </div>

  <!-- NÚT BẬT/TẮT NHẠC -->
  <button id="musicToggle" aria-label="Bật tắt nhạc nền" title="Bật/tắt nhạc nền" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M3 9v6h4l5 5V4L7 9H3z"/>
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03z"/>
      <path d="M19.5 12c0 3.04-1.64 5.64-4 7.03v-2.06c1.54-1.07 2.5-2.87 2.5-4.97s-.96-3.9-2.5-4.97V4.97c2.36 1.39 4 3.99 4 7.03z"/>
    </svg>
  </button>

  <!-- FIREWORK CANVAS -->
  <canvas id="fireworkCanvas" aria-hidden="true"></canvas>

  <!-- AUDIO FILES -->
  <audio id="bgMusic" src="assets/sounds/bg-music.mp3" loop preload="auto"></audio>
  <audio id="clickSound" src="assets/sounds/click.mp3" preload="auto"></audio>
  <audio id="fireworkSound" src="assets/sounds/firework.mp3" preload="auto"></audio>
  <audio id="sparkleSound" src="assets/sounds/sparkle.mp3" preload="auto"></audio>

<script>

  // ===== 5 CÂU SẾN SÚA CỦA TÁC GIẢ LÊ CHÍ TƯỞNG =====
  const loveTexts = [
    "Đừng bao giờ hỏi a chán chưa, vì tình yêu của anh luôn dành cho em chứa chan 💖",
    "Bước vào tiệm giày rồi bước ra, không có đôi nào đẹp bằng đôi ta 👟💕",
    "Nghe nói đường vào tim anh lắm lỗi, em thấy hơi rắc rối nên thôi khỏi vào 😏💗",
    "Tình yêu anh giành cho em giống như giá xăng, giảm thì ít mà tăng thì nhiều ⛽💖",
    "Tự nhiên anh thấy lờ đờ, tưởng đâu say nắng ai ngờ say em 😵💖"
  ];

  // ===== LẤY ELEMENTS =====
  const loveTextBox = document.getElementById('loveTextBox');
  const loveBtn = document.getElementById('loveBtn');
  const requestBtn = document.getElementById('requestBtn');
  const popupOverlay = document.getElementById('popupOverlay');
  const optionButtons = popupOverlay.querySelectorAll('.optionBtn');
  const musicToggle = document.getElementById('musicToggle');
  const bgMusic = document.getElementById('bgMusic');
  const clickSound = document.getElementById('clickSound');
  const fireworkSound = document.getElementById('fireworkSound');
  const sparkleSound = document.getElementById('sparkleSound');
  const fireworkCanvas = document.getElementById('fireworkCanvas');
  const ctx = fireworkCanvas.getContext('2d');
  const card = document.querySelector('.card');
  const heartContainer = document.getElementById('heartContainer');

  let lastLoveIndex = -1;

  // ===== RANDOM KHÔNG TRÙNG LIÊN TIẾP =====
  function getRandomLoveIndex() {
    let idx;
    do {
      idx = Math.floor(Math.random() * loveTexts.length);
    } while (idx === lastLoveIndex);
    lastLoveIndex = idx;
    return idx;
  }

  // ===== HIỆU ỨNG FADE =====
  function fadeOutIn(element, newText) {
    element.style.opacity = 0;
    setTimeout(() => {
      element.textContent = newText;
      element.style.opacity = 1;
    }, 400);
  }

  // ===== KHỞI TẠO CÂU ĐẦU TIÊN =====
  window.addEventListener('DOMContentLoaded', () => {
    const idx = getRandomLoveIndex();
    loveTextBox.textContent = loveTexts[idx];
  });

  // ===== BUTTON LỜI YÊU THƯƠNG =====
  loveBtn.addEventListener('click', () => {
    clickSound.currentTime = 0;
    clickSound.play();
    const idx = getRandomLoveIndex();
    fadeOutIn(loveTextBox, loveTexts[idx]);
  });

  // ===== POPUP MỞ/ĐÓNG =====
  requestBtn.addEventListener('click', () => {
    clickSound.currentTime = 0;
    clickSound.play();
    popupOverlay.style.display = 'flex';
    popupOverlay.focus();
  });

  popupOverlay.addEventListener('click', (e) => {
    if (e.target === popupOverlay) {
      closePopup();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && popupOverlay.style.display === 'flex') {
      closePopup();
    }
  });

  function closePopup() {
    popupOverlay.style.display = 'none';
  }

  // ===== HỆ THỐNG PHÁO HOA =====
  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.color = color;
      this.radius = Math.random() * 2 + 1;
      this.speed = Math.random() * 4 + 2;
      this.angle = Math.random() * 2 * Math.PI;
      this.vx = Math.cos(this.angle) * this.speed;
      this.vy = Math.sin(this.angle) * this.speed;
      this.alpha = 1;
      this.decay = Math.random() * 0.015 + 0.007;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.alpha -= this.decay;
      if (this.alpha < 0) this.alpha = 0;
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
      ctx.fill();
      ctx.restore();
    }
  }

  let particles = [];
  let animationFrameId = null;

  function createFirework(x, y) {
    const colors = ['#ff4fa3', '#ff6ec7', '#ff9ad5', '#d6336c', '#ffb6c1', '#ff1493'];
    particles = [];
    for (let i = 0; i < 80; i++) {
      const color = colors[Math.floor(Math.random() * colors.length)];
      particles.push(new Particle(x, y, color));
    }
    if (!animationFrameId) {
      animateFirework();
    }
  }

  function animateFirework() {
    ctx.clearRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);
    particles.forEach((p, i) => {
      p.update();
      p.draw(ctx);
      if (p.alpha <= 0) {
        particles.splice(i, 1);
      }
    });
    if (particles.length > 0) {
      animationFrameId = requestAnimationFrame(animateFirework);
    } else {
      animationFrameId = null;
    }
  }

  // ===== RESIZE CANVAS =====
  function resizeCanvas() {
    fireworkCanvas.width = window.innerWidth;
    fireworkCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ===== KHI BẤM YÊU CẦU → PHÁO HOA + ÂM THANH =====
  optionButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      clickSound.currentTime = 0;
      clickSound.play();
      closePopup();

      const rect = card.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      createFirework(x, y);

      fireworkSound.currentTime = 0;
      sparkleSound.currentTime = 0;
      fireworkSound.play();
      sparkleSound.play();
    });
  });

  // ===== BẬT/TẮT NHẠC =====
  let musicPlaying = false;
  musicToggle.addEventListener('click', () => {
    if (musicPlaying) {
      bgMusic.pause();
      musicPlaying = false;
      musicToggle.querySelector('svg').style.fill = '#ff4fa3';
    } else {
      bgMusic.play();
      musicPlaying = true;
      musicToggle.querySelector('svg').style.fill = '#ff9ad5';
    }
  });

  // ===== TIM RƠI LIÊN TỤC =====
  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.textContent = '💖';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random() * 1 + 1.2) + 'rem';
    heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
    heartContainer.appendChild(heart);
    setTimeout(() => {
      heart.remove();
    }, 10000);
  }
  setInterval(createHeart, 400);

</script>
</body>
</html>
