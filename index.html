<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bao Nhác Xinh Đẹp Tuyệt Vời 💖✨</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffe6f2,#fff0f8,#fce6ff);
overflow:hidden;
}

/* TIM RƠI */
.heart{
position:fixed;
top:-20px;
animation:fall linear forwards;
z-index:0;
}
@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

/* CARD THIỆP */
.card{
position:relative;
width:90%;
max-width:600px;
background:white;
border-radius:25px;
padding:40px 30px;
text-align:center;
box-shadow:0 15px 40px rgba(255,105,180,0.3);
z-index:2;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

/* VIỀN TRANG TRÍ */
.card::before{
content:"";
position:absolute;
top:-10px;
left:-10px;
right:-10px;
bottom:-10px;
border-radius:30px;
background:linear-gradient(45deg,#ff9ad5,#ffc0f1,#ff6ec7);
z-index:-1;
filter:blur(20px);
opacity:0.5;
}

/* TIÊU ĐỀ */
h1{
font-family:'Pacifico',cursive;
font-size:2.5em;
color:#ff4fa3;
margin-bottom:15px;
text-shadow:0 0 10px rgba(255,105,180,0.4);
}

/* NỘI DUNG */
#loveBox{
margin-top:15px;
min-height:80px;
color:#555;
font-size:1em;
line-height:1.6;
}

/* BUTTON */
button{
margin:10px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff6ec7,#ff9ad5);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(255,105,180,0.4);
}

button:hover{
transform:scale(1.08);
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-content{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0)}
to{transform:scale(1)}
}

/* FIREWORK */
.firework{
position:fixed;
width:8px;
height:8px;
border-radius:50%;
pointer-events:none;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y)) scale(3);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">
<h1>Bao Nhác Xinh Đẹp Tuyệt Vời 💖✨</h1>

<div id="loveBox"></div>

<button id="loveBtn">💌 Lời yêu thương</button>
<button id="requestBtn">👑 Gửi yêu cầu</button>
</div>

<div class="popup" id="requestPopup">
<div class="popup-content">
<h3>👑 Hoàng tử sẵn sàng phục vụ</h3>
<button class="optionBtn">🍳 Nấu ăn</button>
<button class="optionBtn">🍓 Mua hoa quả</button>
<button class="optionBtn">🎬 Xem phim</button>
<button class="optionBtn">🛍 Shopping</button>
<button class="optionBtn">🌸 Mua hoa</button>
<br><br>
<button noscript="closePopup()">Đóng</button>
</div>
</div>

<script>

/* LOVE MESSAGE */
const loveMessages=[
"💖 Em là điều ngọt ngào nhất anh từng có. Chỉ cần em ở đây, thế giới này đã đủ dịu dàng.",
"🌸 Nếu hạnh phúc có hình dạng, chắc chắn nó mang tên em.",
"💫 Mỗi lần em cười, tim anh lại mềm ra một chút.",
"👑 Anh chỉ mong mỗi ngày đều được nhìn thấy em rạng rỡ như thế này."
];

let lastIndex=-1;

document.getElementById("loveBtn").addEventListener("click",function(){
const box=document.getElementById("loveBox");

let randomIndex;
do{
randomIndex=Math.floor(Math.random()*loveMessages.length);
}while(randomIndex===lastIndex);

lastIndex=randomIndex;
box.innerHTML=loveMessages[randomIndex];
});

/* POPUP */
document.getElementById("requestBtn").addEventListener("click",function(){
document.getElementById("requestPopup").style.display="flex";
});

function closePopup(){
document.getElementById("requestPopup").style.display="none";
}

/* OPTION CLICK */
document.querySelectorAll(".optionBtn").forEach(btn=>{
btn.addEventListener("click",function(){
closePopup();
firework();
});
});

/* HEART RAIN */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
heart.style.animationDuration=(Math.random()*5+4)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),9000);
}
setInterval(createHeart,600);

/* FIREWORK */
function firework(){
for(let i=0;i<35;i++){
const fw=document.createElement("div");
fw.classList.add("firework");
fw.style.left=window.innerWidth/2+"px";
fw.style.top=window.innerHeight/2+"px";
fw.style.background=`hsl( ${Math.random()*360},100%,65%)`;
fw.style.setProperty('--x',(Math.random()*400-200)+'px');
fw.style.setProperty('--y',(Math.random()*400-200)+'px');
document.body.appendChild(fw);
setTimeout(()=>fw.remove(),1000);
}
}

</script>

</body>
</html>
